<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXUS Staking — 10,000+ Staking Pools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #07090f;
            color: #eef2f8;
            overflow-x: hidden;
            line-height: 1.6;
        }
        a { color: #00e5ff; text-decoration: none; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .glow { position: fixed; border-radius: 50%; filter: blur(150px); opacity: 0.15; pointer-events: none; z-index: 0; }
        .glow-1 { width: 600px; height: 600px; background: #14f195; top: -200px; right: -300px; }
        .glow-2 { width: 600px; height: 600px; background: #6C3CE1; bottom: -200px; left: -300px; }

        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            padding: 12px 0; background: rgba(7,9,15,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .header-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 20px; }
        .logo img { height: 32px; border-radius: 8px; }
        .logo span { background: linear-gradient(135deg, #6C3CE1, #00d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; font-size: 13px; font-weight: 600; }
        .nav-links a { color: #b0b8d1; padding: 6px 12px; border-radius: 8px; transition: 0.2s; }
        .nav-links a:hover { color: #fff; background: rgba(108,60,225,0.1); }
        .nav-links .active { color: #00d4ff; background: rgba(0,212,255,0.08); }
        .nav-links .btn-home { border: 1px solid #6C3CE1; padding: 6px 18px; border-radius: 40px; color: #fff !important; transition: 0.2s; }
        .nav-links .btn-home:hover { background: #6C3CE1; color: #0b0e1a !important; }

        .page-header { margin-top: 70px; padding: 30px 0 20px; text-align: center; position: relative; z-index: 2; }
        .page-header h1 { font-size: 2.5rem; font-weight: 900; }
        .page-header h1 span { background: linear-gradient(135deg, #6C3CE1, #00d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-header p { color: #8892b0; margin-top: 6px; font-size: 1rem; }

        .stats-bar { position: relative; z-index: 2; display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; padding: 16px 0; max-width: 1000px; margin: 0 auto; }
        .stat-box { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); padding: 10px 14px; border-radius: 12px; text-align: center; }
        .stat-box .num { font-size: 1.1rem; font-weight: 700; color: #00d4ff; }
        .stat-box .lbl { font-size: 0.6rem; color: #8892b0; text-transform: uppercase; letter-spacing: 0.3px; }

        .staking-grid { position: relative; z-index: 2; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; padding: 16px 0 40px; }
        .stake-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 14px; padding: 16px; transition: 0.2s; text-align: center; }
        .stake-card:hover { border-color: #14f195; transform: translateY(-3px); background: rgba(20,241,149,0.04); }
        .stake-card .icon { font-size: 2.4rem; }
        .stake-card .pool { font-size: 0.9rem; font-weight: 700; margin-top: 4px; }
        .stake-card .apy { font-size: 1.2rem; font-weight: 800; color: #14f195; }
        .stake-card .duration { font-size: 0.7rem; color: #8892b0; }
        .stake-card .rewards { font-size: 0.7rem; color: #00d4ff; }
        .stake-card .badge { font-size: 0.55rem; background: rgba(20,241,149,0.12); color: #14f195; padding: 2px 10px; border-radius: 20px; display: inline-block; margin-top: 6px; }

        footer { position: relative; z-index: 2; padding: 24px 0; border-top: 1px solid rgba(255,255,255,0.04); text-align: center; color: #8892b0; font-size: 0.75rem; }
        footer .links { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; }
        footer .links a { color: #b0b8d1; font-size: 12px; }
        footer .links a:hover { color: #fff; }

        @media (max-width: 700px) {
            .header-inner { flex-direction: column; align-items: stretch; text-align: center; }
            .nav-links { justify-content: center; }
            .page-header h1 { font-size: 1.8rem; }
            .staking-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
        }
    </style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<header>
    <div class="container header-inner">
        <a href="index.html" class="logo">
            <img src="https://raw.githubusercontent.com/eximtrustoilbank-sudo/nexus/refs/heads/main/nexus_logo.png" alt="NEXUS">
            <span>NEXUS</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="trade.html">Trade</a>
            <a href="insurance.html">Insurance</a>
            <a href="staking.html" class="active">Staking</a>
            <a href="dao.html">DAO</a>
            <a href="index.html" class="btn-home">← Back</a>
        </div>
    </div>
</header>

<div class="page-header container">
    <h1>🪙 <span>Staking</span></h1>
    <p>10,000+ staking pools — earn rewards by locking your NEX tokens</p>
</div>

<div class="container stats-bar" id="statsBar"></div>

<div class="container staking-grid" id="stakingGrid"></div>

<footer>
    <div class="container">
        <div class="links">
            <a href="index.html">Home</a>
            <a href="trade.html">Trade</a>
            <a href="insurance.html">Insurance</a>
            <a href="staking.html">Staking</a>
            <a href="dao.html">DAO</a>
            <a href="https://www.geckoterminal.com/solana/pools/FKRKSVTQpCngomVftV6HRhPXAp9BJhbWoFwH1JwY1XA6" target="_blank">📊 Chart</a>
        </div>
        <div>📜 6WBoPatSisMYCN8y6xZECu4E9VcMhqyE56vD3zrQbCts</div>
        <div style="margin-top:6px;font-size:0.65rem;color:#5a6488;">© 2026 NEXUS Protocol — 10,000+ staking pools | Built on Solana 🛡️</div>
    </div>
</footer>

<script>
    // ============================================================
    // 10,000+ СТЕЙКИНГ-ПУЛОВ
    // ============================================================

    function generateStaking(count) {
        const data = [];
        const icons = ['🪙', '💰', '💎', '🔷', '🟣', '🟢', '🔴', '🧊', '⚡', '🔥', '🌟', '🎯', '🚀', '💫', '✨'];
        const pools = [
            'NEX Staking', 'NEX-ETH', 'NEX-SOL', 'NEX-USDC', 'NEX-USDT',
            'NEX-BONK', 'NEX-WIF', 'NEX-JUP', 'NEX-MEI', 'NEX-ORCA',
            'NEX-RAY', 'NEX-KMNO', 'NEX-MNDE', 'NEX-HNT', 'NEX-RNDR'
        ];
        const apys = ['12.5%', '18.3%', '22.7%', '15.8%', '20.1%', '25.4%', '9.2%', '14.6%', '27.3%', '11.8%', '19.7%', '23.1%', '16.4%', '21.9%', '13.2%'];
        const durations = ['30 days', '60 days', '90 days', '180 days', '1 year', 'Flexible'];
        const rewardTokens = ['NEX', 'NEX + SOL', 'NEX + USDC', 'NEX + BONK', 'NEX + WIF'];
        const badges = ['🔥 High APY', '⭐ Popular', '🆕 New', '💎 Premium', '✅ Verified'];
        for (let i = 0; i < count; i++) {
            const pool = pools[i % pools.length] + ` ${i + 1}`;
            const apy = apys[i % apys.length];
            const duration = durations[i % durations.length];
            const reward = rewardTokens[i % rewardTokens.length];
            const badge = badges[i % badges.length];
            data.push({
                icon: icons[i % icons.length],
                pool: pool,
                apy: apy,
                duration: duration,
                reward: reward,
                badge: badge
            });
        }
        return data;
    }

    const stakingData = generateStaking(10500);

    function renderStats() {
        const el = document.getElementById('statsBar');
        const total = stakingData.length;
        const avgAPY = stakingData.reduce((sum, d) => sum + parseFloat(d.apy), 0) / total;
        el.innerHTML = `
            <div class="stat-box"><div class="num">${total.toLocaleString()}</div><div class="lbl">Staking Pools</div></div>
            <div class="stat-box"><div class="num">${avgAPY.toFixed(1)}%</div><div class="lbl">Avg. APY</div></div>
            <div class="stat-box"><div class="num">${Math.round(Math.random() * 50 + 10)}K</div><div class="lbl">Total Staked</div></div>
            <div class="stat-box"><div class="num">${Math.round(Math.random() * 20 + 5)}K</div><div class="lbl">Stakers</div></div>
        `;
    }
    renderStats();

    function renderStaking() {
        const el = document.getElementById('stakingGrid');
        const display = stakingData.slice(0, 2000);
        el.innerHTML = display.map(d => `
            <div class="stake-card">
                <div class="icon">${d.icon}</div>
                <div class="pool">${d.pool}</div>
                <div class="apy">${d.apy}</div>
                <div class="duration">⏱ ${d.duration}</div>
                <div class="rewards">🎁 ${d.reward}</div>
                <div class="badge">${d.badge}</div>
            </div>
        `).join('');
        document.querySelector('.page-header p').textContent = 
            `${stakingData.length.toLocaleString()} staking pools — earn rewards by locking your NEX tokens`;
    }
    renderStaking();

    console.log('✅ NEXUS Staking: 10,500+ пулов загружено');
</script>
</body>
</html>
